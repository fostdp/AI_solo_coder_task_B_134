# 全局Gzip默认配置 (已在default.conf中详细配置
# 这里可在server块中直接include
# 包含在nginx.conf中，作为全局默认
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
gzip_vary on;
gzip_proxied any;
