# MQTT 访问控制列表 (ACL)
# 格式: [read|write|readwrite] <topic>

# 后端服务：只读传感器数据，只写命令
user backend
pattern read armillary/+/sensor/data
pattern write armillary/+/command

# 模拟器：只写传感器数据
user simulator
pattern write armillary/+/sensor/data
pattern read armillary/+/command

# 前端：只读所有数据
user frontend
pattern read armillary/#
