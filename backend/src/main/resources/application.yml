server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

spring:
  application:
    name: armillary-simulation

  datasource:
    url: jdbc:postgresql://localhost:5432/armillary_simulation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        generate_statistics: false
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mqtt:
  broker: tcp://localhost:1883
  client-id: armillary-backend
  username: admin
  password: password
  topic:
    sensor: armillary/+/sensor/data
    command: armillary/+/command

websocket:
  endpoint: /ws/armillary
  topic-prefix: /topic
  app-prefix: /app

simulation:
  alert:
    max-wear-threshold: 0.1
    max-pointing-error-arcmin: 1.0
  friction:
    time-step-seconds: 60
    wear-update-interval: 1

logging:
  level:
    root: INFO
    com.astrohistory.armillary: DEBUG
    org.springframework.integration.mqtt: DEBUG
  file:
    name: logs/armillary-simulation.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,env,beans,mappings
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      roles: ADMIN
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 10s
        descriptions: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.9, 0.95, 0.99
  info:
    build:
      enabled: true
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 2.0.0
    description: "古代天文简仪轴承摩擦仿真与指向精度分析系统"
    architecture: "Spring Events 4模块解耦架构"
    maintainer: "astrohistory-research@example.com"
  java:
    version: ${java.version}
    vendor: ${java.vm.vendor}
